<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This changes the name on your browser tab -->
    <title>traderscheme.com | Trading Desk</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 20px; margin: 0; }
        .navbar { background: #1a1a1e; padding: 15px 30px; border-bottom: 1px solid #2a2a30; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 22px; font-weight: bold; color: #00e676; letter-spacing: 0.5px; }
        .container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px; }
        .card { background: #1a1a1e; border: 1px solid #2a2a30; padding: 20px; border-radius: 8px; }
        .full-width { grid-column: 1 / -1; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { background: #00e676; color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

<!-- New Header Navigation Bar -->
<div class="navbar">
    <div class="brand">traderscheme.com</div>
    <div style="color: #aaa; font-size: 14px;">Live Trading Desk</div>
</div>

<div class="container">
    <div class="card full-width">
        <h2>Dashboard</h2>
        <label>Account User: </label>
        <input type="text" id="username" value="trader1" onchange="updateDashboard()">
        <p>USD Balance: <span id="usd-bal" style="color:#00e676">$0.00</span> | Asset Balance: <span id="asset-bal" style="color:#00b0ff">0.00 UNITS</span></p>
        <p>Market Price: <span id="market-price" style="font-size:20px; font-weight:bold;">$100.00</span></p>
    </div>
    <div class="card">
        <h2>Deposit</h2>
        <input type="number" id="deposit-amount" placeholder="Amount ($)">
        <button onclick="handleDeposit()">Deposit Cash</button>
    </div>
    <div class="card">
        <h2>Trade</h2>
        <select id="trade-side"><option value="BUY">Buy</option><option value="SELL">Sell</option></select>
        <input type="number" id="trade-qty" placeholder="Quantity">
        <button onclick="handleTrade()">Submit Order</button>
    </div>
</div>
<script>
    async function updateDashboard() {
        const username = document.getElementById('username').value;
        const res = await fetch(`/api/user/${username}`);
        const data = await res.json();
        document.getElementById('usd-bal').innerText = `$${data.balances.USD.toFixed(2)}`;
        document.getElementById('asset-bal').innerText = `${data.balances.ASSET.toFixed(4)} UNITS`;
        document.getElementById('market-price').innerText = `$${data.currentMarketPrice.toFixed(2)}`;
    }
    async function handleDeposit() {
        const username = document.getElementById('username').value;
        const amount = document.getElementById('deposit-amount').value;
        await fetch('/api/deposit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, amount }) });
        updateDashboard();
    }
    async function handleTrade() {
        const username = document.getElementById('username').value;
        const side = document.getElementById('trade-side').value;
        const quantity = document.getElementById('trade-qty').value;
        await fetch('/api/trade', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, side, quantity }) });
        updateDashboard();
    }
    updateDashboard();
</script>
</body>
</html>
