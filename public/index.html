<!-- App Engineering Routing & Live Broker Integration Scripts -->
    <script>
        // Central Routing Machine
        function showStage(stageId) {
            const stage = document.getElementById('stage-' + stageId);
            if (stage) {
                document.querySelectorAll('.app-stage').forEach(el => el.classList.remove('active-stage'));
                stage.classList.add('active-stage');
            }
            // Draw initial chart outline when navigating
            if (stageId === 'landing') drawCandlesticks('candlestickCanvasLanding', liveCandles);
            if (stageId === 'trading') drawCandlesticks('candlestickCanvasTrading', liveCandles);
        }

        // Vector Eye Icon Input Controller Matrix
        function togglePasswordVisibility(inputId, buttonEl) {
            const inputField = document.getElementById(inputId);
            const eyeIconSvg = buttonEl.querySelector('svg');
            if (inputField.type === "password") {
                inputField.type = "text";
                eyeIconSvg.innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3 1.34-3 3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm11-3c-1.73-4.39-6-7.5-11-7.5S2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>`;
                eyeIconSvg.style.fill = "var(--primary)";
            } else {
                inputField.type = "password";
                eyeIconSvg.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
                eyeIconSvg.style.fill = "var(--text-muted)";
            }
        }

        // Registration Handler
        async function handleRegistrationSubmit() {
            const userVal = document.getElementById('regUser').value.trim();
            const emailVal = document.getElementById('regEmail').value.trim();
            const passVal = document.getElementById('regPass').value;
            const confirmVal = document.getElementById('regPassConfirm').value;

            if (!userVal || !emailVal || !passVal || !confirmVal) {
                return alert('All system identification credentials are required.');
            }
            if (passVal !== confirmVal) {
                return alert('Security Error: Password fields do not match. Please verify inputs.');
            }

            window.globalUserEmail = emailVal;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userVal, email: emailVal, password: passVal })
                });
                const data = await response.json();
                if (data.success) {
                    if (document.getElementById('targetDisplayEmail')) {
                        document.getElementById('targetDisplayEmail').innerText = emailVal;
                    }
                    showStage('email-auth');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                // Fallback for frontend-only testing
                if (document.getElementById('targetDisplayEmail')) {
                    document.getElementById('targetDisplayEmail').innerText = emailVal;
                }
                showStage('email-auth');
            }
        }

        function confirmEmailOtpToken() {
            const enteredOtp = document.getElementById('emailOtpCode').value.trim().replace('-', '');
            if (enteredOtp !== "774902") {
                return alert('Invalid Account Verification Code Token. Access Denied.');
            }
            showStage('verification');
        }

        function bypassToTradingDesk() {
            document.getElementById('terminalUserTag').innerText = "OPERATOR: TRADER1";
            document.getElementById('cryptoAddressString').innerText = "Deposit Address: TYR43AD79K88xM9qN2B77X";
            document.getElementById('navAuthActions').innerHTML = `<button class="btn-outline" onclick="window.location.reload()" style="color:var(--primary); border-color:var(--primary);">Disconnect Node</button>`;
            showStage('trading');
        }

        // --- DERIV BROKER LIVE INTEGRATION ENGINE ---
        let derivSocket;
        let liveCandles = [];
        const maxCandles = 20;

        // Initialize connection to Deriv secure API WebSocket
        function connectToDerivBroker() {
            // Using Deriv's default public application ID '1089'
            const appId = '1089'; 
            derivSocket = new WebSocket(`wss://ws.derivws.com/v3/app_id=${appId}`);

            derivSocket.onopen = () => {
                console.log("Connected to Deriv Broker Link.");
                // Subscribe to real-time tick stream for Volatility 100 Index (R_100)
                derivSocket.send(JSON.stringify({
                    ticks: 'R_100'
                }));
            };

            derivSocket.onmessage = (event) => {
                const response = JSON.parse(event.data);
                
                if (response.msg_type === 'tick' && response.tick) {
                    const price = response.tick.quote;
                    const timestamp = response.tick.epoch;
                    
                    // Update current price tags across UI stages
                    const priceText = `$${parseFloat(price).toFixed(2)}`;
                    if (document.getElementById('landing-price')) {
                        document.getElementById('landing-price').innerText = priceText;
                    }
                    if (document.getElementById('trading-price')) {
                        document.getElementById('trading-price').innerText = priceText;
                    }

                    // Process price updates into live visual candles
                    processNewPriceTick(price);
                }
            };

            derivSocket.onerror = (error) => {
                console.error("Deriv Broker connection error: ", error);
            };

            derivSocket.onclose = () => {
                console.log("Deriv Broker connection closed. Retrying in 5 seconds...");
                setTimeout(connectToDerivBroker, 5000);
            };
        }

        // Structure ticks into Candlestick OHLC format dynamically
        function processNewPriceTick(price) {
            if (liveCandles.length === 0) {
                // Initialize first candle
                liveCandles.push({ o: price, h: price, l: price, c: price, count: 1 });
            } else {
                let currentCandle = liveCandles[liveCandles.length - 1];
                
                // Group every 6 ticks into a single candlestick
                if (currentCandle.count < 6) {
                    currentCandle.h = Math.max(currentCandle.h, price);
                    currentCandle.l = Math.min(currentCandle.l, price);
                    currentCandle.c = price;
                    currentCandle.count++;
                } else {
                    // Create new candle
                    if (liveCandles.length >= maxCandles) {
                        liveCandles.shift(); // Remove oldest to keep chart clean
                    }
                    liveCandles.push({ o: price, h: price, l: price, c: price, count: 1 });
                }
            }

            // Redraw active canvas feeds with new coordinates
            drawCandlesticks('candlestickCanvasLanding', liveCandles);
            drawCandlesticks('candlestickCanvasTrading', liveCandles);
        }

        // Live Financial HTML5 Canvas Candlestick Engine
        function drawCandlesticks(canvasId, candles) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || candles.length === 0) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dynamically scale candles based on high/low limits in current dataset
            const highs = candles.map(c => c.h);
            const lows = candles.map(c => c.l);
            const minPrice = Math.min(...lows) * 0.9995;
            const maxPrice = Math.max(...highs) * 1.0005;
            const priceRange = maxPrice - minPrice;

            const spacing = canvas.width / maxCandles;
            const candleWidth = spacing * 0.65;

            candles.forEach((c, index) => {
                const x = (index * spacing) + (spacing * 0.15);
                const isGreen = c.c >= c.o;
                ctx.strokeStyle = isGreen ? "#02c076" : "#f84960";
                ctx.fillStyle = isGreen ? "#02c076" : "#f84960";
                ctx.lineWidth = 2;

                // Scale prices to canvas pixels
                const scaleY = (val) => canvas.height - ((val - minPrice) / priceRange * canvas.height);

                const yOpen = scaleY(c.o);
                const yClose = scaleY(c.c);
                const yHigh = scaleY(c.h);
                const yLow = scaleY(c.l);

                // Draw Wick (High to Low)
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, yHigh);
                ctx.lineTo(x + candleWidth / 2, yLow);
                ctx.stroke();

                // Draw Candle Body (Open to Close)
                const bodyHeight = Math.max(Math.abs(yOpen - yClose), 2); // Minimum 2px height for flat ticks
                ctx.fillRect(x, Math.min(yOpen, yClose), candleWidth, bodyHeight);
            });
        }

        // Run broker data pipeline on initialization
        window.onload = function() {
            connectToDerivBroker();
        };
    </script>
