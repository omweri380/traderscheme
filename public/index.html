<script>
    // Central Routing Machine
    function showStage(stageId) {
        document.querySelectorAll('.app-stage').forEach(el => el.classList.remove('active-stage'));
        document.getElementById('stage-' + stageId).classList.add('active-stage');
        
        // Re-render financial candlesticks correctly upon toggle
        if (stageId === 'landing') drawCandlesticks('candlestickCanvasLanding');
        if (stageId === 'trading') drawCandlesticks('candlestickCanvasTrading');
    }

    // Vector Eye Icon Input Controller Matrix
    function togglePasswordVisibility(inputId, buttonEl) {
        const inputField = document.getElementById(inputId);
        const eyeIconSvg = buttonEl.querySelector('svg');
        if (inputField.type === "password") {
            inputField.type = "text";
            // Switch to Slash Eye icon state vector geometry
            eyeIconSvg.innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3 1.34-3 3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm11-3c-1.73-4.39-6-7.5-11-7.5S2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>`;
            eyeIconSvg.style.fill = "var(--primary)";
        } else {
            inputField.type = "password";
            // Return to Open Eye configuration
            eyeIconSvg.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
            eyeIconSvg.style.fill = "var(--text-muted)";
        }
    }

    // Main Account Registration Handler (with Live Backend Integration & Password Pipeline)
    async function handleRegistrationSubmit() {
        const userVal = document.getElementById('regUser').value.trim();
        const emailVal = document.getElementById('regEmail').value.trim();
        const passVal = document.getElementById('regPass').value;
        const confirmVal = document.getElementById('regPassConfirm').value;

        if (!userVal || !emailVal || !passVal || !confirmVal) {
            return alert('All system identification credentials are required.');
        }

        if (passVal !== confirmVal) {
            return alert('Security Error: Password fields do not match. Please verify inputs.');
        }

        // Save the email globally so the verification screen knows who is registering
        window.globalUserEmail = emailVal;

        try {
            // Send username, email, and password registration payload to your API routing tier
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: userVal, email: emailVal, password: passVal })
            });

            const data = await response.json();

            if (data.success) {
                // Advance execution forward into the verification PIN grid screen layout
                if (document.getElementById('targetDisplayEmail')) {
                    document.getElementById('targetDisplayEmail').innerText = emailVal;
                }
                showStage('email-auth');
            } else {
                alert('Error: ' + data.error);
            }
        } catch (err) {
            alert('Could not connect to the authentication server architecture node.');
        }
    }

    function confirmEmailOtpToken() {
        const enteredOtp = document.getElementById('emailOtpCode').value.trim().replace('-', '');
        // System matching security parameter control token
        if (enteredOtp !== "774902") {
            return alert('Invalid Account Verification Code Token. Access Denied.');
        }
        // Proceed forward to KYC documentation page
        showStage('verification');
    }

    function bypassToTradingDesk() {
        document.getElementById('terminalUserTag').innerText = "OPERATOR: TRADER1";
        document.getElementById('cryptoAddressString').innerText = "Deposit Address: TYR43AD79K88xM9qN2B77X";
        document.getElementById('navAuthActions').innerHTML = `<button class="btn-outline" onclick="window.location.reload()" style="color:var(--primary); border-color:var(--primary);">Disconnect Node</button>`;
        showStage('trading');
        updateDashboard();
    }

    // High-fidelity Financial HTML5 Canvas Candlestick Engine
    function drawCandlesticks(canvasId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const candles = [
            { o: 88, h: 96, l: 85, c: 94 }, { o: 94, h: 104, l: 92, c: 102 }, 
            { o: 102, h: 103, l: 91, c: 93 }, { o: 93, h: 106, l: 92, c: 105 }, 
            { o: 105, h: 115, l: 101, c: 112 }, { o: 112, h: 114, l: 100, c: 102 }, 
            { o: 102, h: 109, l: 98, c: 107 }, { o: 107, h: 118, l: 104, c: 116 }, 
            { o: 116, h: 124, l: 111, c: 121 }, { o: 121, h: 122, l: 109, c: 113 }, 
            { o: 113, h: 128, l: 112, c: 126 }, { o: 126, h: 130, l: 118, c: 124 }
        ];
        
        const spacing = canvas.width / candles.length;
        const candleWidth = spacing * 0.65;
        
        candles.forEach((candle, index) => {
            const x = index * spacing + spacing * 0.15;
            const isGreen = candle.c >= candle.o;
            ctx.strokeStyle = isGreen ? "#02c076" : "#f84960";
            ctx.fillStyle = isGreen ? "#02c076" : "#f84960";
            ctx.lineWidth = 2;
            
            // Draw wick limits
            ctx.beginPath();
            ctx.moveTo(x + candleWidth / 2, canvas.height - candle.h);
            ctx.lineTo(x + candleWidth / 2, canvas.height - candle.l);
            ctx.stroke();
            
            // Draw candle real body elements
            const topY = canvas.height - Math.max(candle.o, candle.c);
            const bodyHeight = Math.abs(candle.o - candle.c) || 2;
            ctx.fillRect(x, topY, candleWidth, bodyHeight);
        });
    }

    // Dynamic Live Order Execution & Simulation Engine
    let userUsdBalance = 10000.00;
    let userAssetAllocation = 0.0000;
    let currentSpotPrice = 124.50;

    function updateDashboard() {
        if(document.getElementById('usd-bal')) document.getElementById('usd-bal').innerText = `$${userUsdBalance.toFixed(2)}`;
        if(document.getElementById('asset-bal')) document.getElementById('asset-bal').innerText = `${userAssetAllocation.toFixed(4)} UNITS`;
        if(document.getElementById('walletCryptoBalance')) document.getElementById('walletCryptoBalance').innerText = `${(userUsdBalance / 1.002).toFixed(2)} USDT`;
        if(document.getElementById('market-price')) document.getElementById('market-price').innerText = `$${currentSpotPrice.toFixed(2)}`;
        if(document.getElementById('landing-price')) document.getElementById('landing-price').innerText = `$${currentSpotPrice.toFixed(2)}`;
    }

    function handleTrade() {
        const side = document.getElementById('trade-side').value;
        const qty = parseFloat(document.getElementById('trade-qty').value);
        if (isNaN(qty) || qty <= 0) return alert('Invalid volume allocation parameters.');
        
        const totalCost = qty * currentSpotPrice;
        if (side === "BUY") {
            if (totalCost > userUsdBalance) return alert('Insufficient USD funding limits available.');
            userUsdBalance -= totalCost;
            userAssetAllocation += qty;
        } else {
            if (qty > userAssetAllocation) return alert('Insufficient internal token reserves to cover contract side.');
            userUsdBalance += totalCost;
            userAssetAllocation -= qty;
        }
        updateDashboard();
        alert(`Order successful: Executed ${side} of ${qty} units.`);
    }

    function handleDeposit() {
        const amt = parseFloat(document.getElementById('deposit-amount').value);
        if (isNaN(amt) || amt <= 0) return alert('Enter valid liquidity parameters.');
        userUsdBalance += amt;
        updateDashboard();
        alert(`Funding pipeline complete. Inbound credit added.`);
    }

    function handleWithdrawal() {
        const amt = parseFloat(document.getElementById('withdraw-amount').value);
        if (isNaN(amt) || amt <= 0) return alert('Enter valid clearance parameters.');
        if (amt > userUsdBalance) return alert('Settlement balance exceeds accessible custody asset caps.');
        userUsdBalance -= amt;
        updateDashboard();
        alert(`Withdrawal pipeline initialized. Pending blockchain node confirmation blocks.`);
    }

    // Initialize global canvas renders on standard page landing context frame
    window.onload = function() {
        drawCandlesticks('candlestickCanvasLanding');
        // Tick current feed price points across nodes randomly
        setInterval(() => {
            const shift = (Math.random() - 0.49) * 1.5;
            currentSpotPrice = Math.max(10, currentSpotPrice + shift);
            const priceLabel = document.getElementById('market-price');
            if(priceLabel) priceLabel.innerText = `$${currentSpotPrice.toFixed(2)}`;
            const landLabel = document.getElementById('landing-price');
            if(landLabel) landLabel.innerText = `$${currentSpotPrice.toFixed(2)}`;
        }, 3000);
    };
</script>
